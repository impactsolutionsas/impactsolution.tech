name: CMS CI

on:
  push:
    paths:
      - 'cms/**'
      - '.github/workflows/cms-ci.yml'
  pull_request:
    paths:
      - 'cms/**'
      - '.github/workflows/cms-ci.yml'

defaults:
  run:
    working-directory: cms

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payload
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/payload
      PAYLOAD_SECRET: ci-only-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
