  <circle cx="650" cy="250" r="8" fill="#00BBD3" opacity="0.4"/>
  <circle cx="600" cy="300" r="8" fill="#00BBD3" opacity="0.4"/>
  <circle cx="530" cy="300" r="6" fill="#00BBD3" opacity="0.3"/>
  <circle cx="670" cy="300" r="6" fill="#00BBD3" opacity="0.3"/>
  <circle cx="570" cy="340" r="6" fill="#00BBD3" opacity="0.3"/>
  <circle cx="630" cy="340" r="6" fill="#00BBD3" opacity="0.3"/>
