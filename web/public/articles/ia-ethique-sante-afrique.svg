      <stop offset="0%" stop-color="#132A54"/>
      <stop offset="100%" stop-color="#0A1D3F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Brain outline -->
  <ellipse cx="600" cy="280" rx="120" ry="100" fill="none" stroke="#00BBD3" stroke-width="2" opacity="0.25"/>
  <ellipse cx="600" cy="280" rx="80" ry="65" fill="none" stroke="#00BBD3" stroke-width="1.5" opacity="0.15"/>
