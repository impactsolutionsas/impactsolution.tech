  <line x1="550" y1="250" x2="530" y2="300" stroke="#00BBD3" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="250" x2="670" y2="300" stroke="#00BBD3" stroke-width="1" opacity="0.3"/>
  <!-- Shield (ethics) -->
  <path d="M600 380 L630 395 L630 430 C630 455 600 470 600 470 C600 470 570 455 570 430 L570 395 Z" fill="none" stroke="#00BBD3" stroke-width="2" opacity="0.5"/>
