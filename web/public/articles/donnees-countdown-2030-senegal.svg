<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1D3F"/>
      <stop offset="100%" stop-color="#132A54"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Data visualization bars -->
  <rect x="250" y="350" width="40" height="120" rx="4" fill="#00BBD3" opacity="0.25"/>
  <rect x="320" y="300" width="40" height="170" rx="4" fill="#00BBD3" opacity="0.35"/>
  <rect x="390" y="260" width="40" height="210" rx="4" fill="#00BBD3" opacity="0.45"/>
  <rect x="460" y="220" width="40" height="250" rx="4" fill="#00BBD3" opacity="0.55"/>
  <rect x="530" y="240" width="40" height="230" rx="4" fill="#00BBD3" opacity="0.5"/>
  <!-- Trend line -->
  <polyline points="270,340 340,290 410,250 480,210 550,230" fill="none" stroke="#00BBD3" stroke-width="2.5" opacity="0.7"/>
  <!-- Data points -->
  <circle cx="270" cy="340" r="5" fill="#00BBD3" opacity="0.8"/>
  <circle cx="340" cy="290" r="5" fill="#00BBD3" opacity="0.8"/>
  <circle cx="410" cy="250" r="5" fill="#00BBD3" opacity="0.8"/>
  <circle cx="480" cy="210" r="5" fill="#00BBD3" opacity="0.8"/>
  <circle cx="550" cy="230" r="5" fill="#00BBD3" opacity="0.8"/>
  <!-- Dashboard panel on the right -->
  <rect x="680" y="200" width="280" height="230" rx="12" fill="#00BBD3" opacity="0.08" stroke="#00BBD3" stroke-width="1.5" stroke-opacity="0.2"/>
  <rect x="710" y="230" width="220" height="10" rx="5" fill="#00BBD3" opacity="0.2"/>
  <rect x="710" y="260" width="160" height="10" rx="5" fill="#00BBD3" opacity="0.15"/>
  <rect x="710" y="300" width="220" height="8" rx="4" fill="#00BBD3" opacity="0.12"/>
  <rect x="710" y="320" width="180" height="8" rx="4" fill="#00BBD3" opacity="0.12"/>
  <rect x="710" y="340" width="200" height="8" rx="4" fill="#00BBD3" opacity="0.12"/>
  <rect x="710" y="370" width="100" height="30" rx="6" fill="#00BBD3" opacity="0.2"/>
</svg>
