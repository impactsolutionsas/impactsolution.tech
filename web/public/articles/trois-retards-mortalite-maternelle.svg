<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1D3F"/>
      <stop offset="100%" stop-color="#132A54"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Three delay circles -->
  <circle cx="300" cy="315" r="90" fill="#00BBD3" opacity="0.12" stroke="#00BBD3" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="600" cy="315" r="90" fill="#00BBD3" opacity="0.12" stroke="#00BBD3" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="900" cy="315" r="90" fill="#00BBD3" opacity="0.12" stroke="#00BBD3" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Connecting arrows -->
  <path d="M390 315 L510 315" stroke="#00BBD3" stroke-width="2" opacity="0.5" stroke-dasharray="6 4"/>
  <path d="M690 315 L810 315" stroke="#00BBD3" stroke-width="2" opacity="0.5" stroke-dasharray="6 4"/>
  <!-- Icons in circles -->
  <!-- Circle 1: House/Decision -->
  <path d="M300 290 L280 305 L320 305 Z" fill="none" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <rect x="288" y="305" width="24" height="20" fill="none" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <!-- Circle 2: Road/Transport -->
  <path d="M575 310 L625 310 M575 320 L625 320" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <path d="M590 300 L610 300 L615 310 L585 310 Z" fill="none" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <circle cx="590" cy="325" r="5" fill="none" stroke="#00BBD3" stroke-width="2" opacity="0.6"/>
  <circle cx="610" cy="325" r="5" fill="none" stroke="#00BBD3" stroke-width="2" opacity="0.6"/>
  <!-- Circle 3: Hospital/Care -->
  <rect x="885" y="295" width="30" height="35" rx="3" fill="none" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <path d="M900 300 L900 320 M890 310 L910 310" stroke="#00BBD3" stroke-width="2.5" opacity="0.6"/>
  <!-- Labels -->
  <text x="300" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00BBD3" opacity="0.7">1er retard</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00BBD3" opacity="0.7">2e retard</text>
  <text x="900" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00BBD3" opacity="0.7">3e retard</text>
  <!-- Subtle grid pattern -->
  <path d="M0 0 L1200 0 L1200 630 L0 630 Z" fill="none" stroke="#00BBD3" stroke-width="0.5" opacity="0.05"/>
</svg>
